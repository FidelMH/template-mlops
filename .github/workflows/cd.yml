name: Continuous Deployment (Docker Hub)

on:
    push:
        branches: ["main"]
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-actions@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build and Push app_api
          uses: docker/build-push-action@v6
          with:
            context: ./app_api
            push: true
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-template-api:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-template-api:${{ github.sha }}

        - name: Build and Push app_front
          uses: docker/build-push-action@v6
          with:
            context: ./app_front
            push: true
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-template-front:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-template-front:${{ github.sha }}


