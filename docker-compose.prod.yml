version: "3.9"

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env 
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - app_network
    volumes: 
     - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app_api:
    image: mfidel/devops-template-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    command: python main.py
  
  app_front:
    build: ./app_front
    container_name: app_front
    environment:
      - API_URL=http://app_api:8000
    networks:
      - app_network
    ports:
      - "8501:8501"
    command: streamlit run main.py --server.port 8501 --server.address 0.0.0.0

networks:
  app_network:
    driver: bridge
    
volumes:
  postgres_data: